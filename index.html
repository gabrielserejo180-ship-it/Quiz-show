<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>QUIZ SHOW — Palco Digital</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

:root{
  --bg-1:#090C18;
  --bg-2:#120B28;
  --glass:rgba(255,255,255,0.055);
  --glass-2:rgba(255,255,255,0.09);
  --glass-border:rgba(255,255,255,0.12);
  --accent1:#7B5CFA;
  --accent2:#00D9FF;
  --accent3:#FF3D9A;
  --green:#2ECC71;
  --red:#FF5C5C;
  --ink:#F1F3FC;
  --ink-dim:#9AA3C7;
  --font-display:'Space Grotesk', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:linear-gradient(160deg, var(--bg-2), var(--bg-1) 55%);
  color:var(--ink);
  font-family:var(--font-body);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
#bg-canvas{position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none;}
#root{min-height:100vh; display:flex; flex-direction:column; position:relative; z-index:1;}
.wrap{max-width:1180px; margin:0 auto; padding:24px 20px 60px; width:100%; flex:1; display:flex; flex-direction:column; animation:screenIn .45s ease;}
.wrap.narrow{max-width:520px;}
@keyframes screenIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}

/* ---------- typography ---------- */
h1,h2,h3{font-family:var(--font-display); font-weight:600;}
.eyebrow{
  font-family:var(--font-mono); font-size:11px; letter-spacing:3px; color:var(--accent2);
  text-transform:uppercase;
}
.mono{font-family:var(--font-mono);}

/* ---------- landing ---------- */
.stage-title{
  font-family:var(--font-display);
  font-size:clamp(46px,9vw,88px);
  line-height:0.98; font-weight:700;
  text-align:center;
  background:linear-gradient(120deg, var(--accent2), var(--accent1) 55%, var(--accent3));
  background-size:200% 200%;
  -webkit-background-clip:text; background-clip:text; color:transparent;
  animation:gradientflow 6s ease infinite;
  margin-top:9vh;
  filter:drop-shadow(0 0 30px rgba(123,92,250,0.25));
}
@keyframes gradientflow{0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;}}
.stage-sub{text-align:center; color:var(--ink-dim); font-size:14px; margin-top:14px; letter-spacing:1.5px; font-family:var(--font-mono);}
.role-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px; max-width:640px; margin:52px auto 0;}
@media (max-width:560px){ .role-grid{grid-template-columns:1fr;} }
.role-card{
  position:relative; overflow:hidden;
  background:var(--glass); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  border:1px solid var(--glass-border); border-radius:20px;
  padding:34px 22px; text-align:center; cursor:pointer;
  transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
}
.role-card::before{
  content:''; position:absolute; inset:0; opacity:0; border-radius:20px;
  background:radial-gradient(circle at 50% 0%, rgba(123,92,250,0.35), transparent 70%);
  transition:opacity .25s ease;
}
.role-card:hover{transform:translateY(-5px); border-color:rgba(123,92,250,0.5); box-shadow:0 18px 40px rgba(0,0,0,0.4), 0 0 30px rgba(123,92,250,0.15);}
.role-card:hover::before{opacity:1;}
.role-card .icon{font-size:38px; margin-bottom:10px; position:relative;}
.role-card h3{font-size:22px; color:var(--ink); position:relative; letter-spacing:0.5px;}
.role-card p{color:var(--ink-dim); font-size:13px; margin-top:8px; position:relative;}

/* ---------- panels / cards ---------- */
.panel{
  background:var(--glass); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  border:1px solid var(--glass-border); border-radius:20px; padding:26px;
  box-shadow:0 12px 30px rgba(0,0,0,0.25);
}
.panel + .panel{margin-top:16px;}
label{display:block; font-size:12px; letter-spacing:1.5px; color:var(--ink-dim); text-transform:uppercase; margin-bottom:6px; font-family:var(--font-mono);}
input[type=text], input[type=number], select, textarea{
  width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--glass-border); border-radius:12px;
  padding:12px 14px; color:var(--ink); font-family:var(--font-body); font-size:15px; outline:none;
  transition:border-color .15s ease, box-shadow .15s ease;
}
input:focus, select:focus, textarea:focus{border-color:var(--accent2); box-shadow:0 0 0 3px rgba(0,217,255,0.15);}
.field{margin-bottom:16px;}
.row{display:flex; gap:14px; flex-wrap:wrap;}
.row > .field{flex:1; min-width:160px;}
.btn{
  position:relative; overflow:hidden;
  font-family:var(--font-body); font-weight:700; letter-spacing:0.3px; font-size:14px;
  border:none; border-radius:14px; padding:14px 24px; cursor:pointer; color:#fff;
  background:linear-gradient(135deg, var(--accent2), var(--accent1));
  transition:transform .15s ease, box-shadow .15s ease;
  box-shadow:0 8px 22px rgba(123,92,250,0.3);
}
.btn:hover{transform:translateY(-2px); box-shadow:0 12px 28px rgba(123,92,250,0.45);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.4; cursor:not-allowed; transform:none;}
.btn.ghost{background:rgba(255,255,255,0.06); color:var(--ink); border:1px solid var(--glass-border); box-shadow:none;}
.btn.danger{background:linear-gradient(135deg, #ff8a8a, var(--red));}
.btn.wide{width:100%;}
.btn-row{display:flex; gap:12px; margin-top:20px; flex-wrap:wrap;}
.team-input-row{display:flex; gap:8px; margin-bottom:10px;}
.team-input-row input{flex:1;}
.icon-btn{background:rgba(255,92,92,0.15); border:1px solid rgba(255,92,92,0.4); color:var(--red); border-radius:10px; width:40px; cursor:pointer; font-size:16px;}
.link{color:var(--accent2); text-decoration:underline; cursor:pointer; font-size:13px; background:none; border:none; font-family:var(--font-body);}
.error-box{background:rgba(255,92,92,0.1); border:1px solid rgba(255,92,92,0.4); color:#ffb3b3; padding:12px 14px; border-radius:12px; font-size:13px; margin-bottom:14px;}
.helper{color:var(--ink-dim); font-size:12px; margin-top:6px;}

/* ripple click effect */
.ripple{position:absolute; border-radius:50%; background:rgba(255,255,255,0.5); transform:scale(0); animation:rippleAnim .6s ease-out; pointer-events:none;}
@keyframes rippleAnim{to{transform:scale(2.4); opacity:0;}}

/* ---------- lobby / room code ---------- */
.room-code-display{ text-align:center; margin:30px 0 10px; }
.room-code-display .code{
  font-family:var(--font-mono); font-size:clamp(56px,13vw,104px); letter-spacing:16px; font-weight:700;
  background:linear-gradient(120deg, var(--accent2), var(--accent1));
  -webkit-background-clip:text; background-clip:text; color:transparent;
  filter:drop-shadow(0 0 24px rgba(0,217,255,0.3));
}
.player-chip-grid{display:flex; flex-wrap:wrap; gap:10px; margin-top:18px;}
.player-chip{
  background:var(--glass-2); border:1px solid var(--glass-border); border-radius:999px; padding:8px 16px;
  font-size:14px; display:flex; align-items:center; gap:8px; animation:popin .3s ease;
}
.player-chip .dot{width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green);}
@keyframes popin{from{opacity:0; transform:scale(.8);} to{opacity:1; transform:scale(1);}}

/* ---------- question stage (TV) ---------- */
.q-header{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:22px;}
.tag{font-family:var(--font-mono); font-size:12px; letter-spacing:2px; padding:6px 12px; border-radius:999px; border:1px solid var(--glass-border); text-transform:uppercase;}
.tag.padrao{color:var(--accent2); border-color:rgba(0,217,255,0.4); background:rgba(0,217,255,0.08);}
.tag.bonus{color:var(--accent3); border-color:rgba(255,61,154,0.5); background:rgba(255,61,154,0.1); box-shadow:0 0 18px rgba(255,61,154,0.2);}

.q-stage{
  position:relative; text-align:center; padding:50px 20px 30px; border-radius:24px; overflow:hidden;
  background:var(--glass); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  border:1px solid var(--glass-border);
}
.q-stage::before{
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 50% -10%, rgba(123,92,250,0.3), transparent 55%);
  animation:sweep 1s ease-out;
}
@keyframes sweep{from{opacity:0; transform:scale(.6);} to{opacity:1; transform:scale(1);}}
.q-number{font-family:var(--font-mono); color:var(--ink-dim); font-size:13px; letter-spacing:2px; margin-bottom:8px;}
.q-text{font-family:var(--font-display); font-weight:600; font-size:clamp(24px,4vw,40px); line-height:1.2; max-width:900px; margin:0 auto 30px; position:relative;}

.timer-ring{width:96px; height:96px; margin:0 auto 18px; position:relative;}
.timer-ring svg{transform:rotate(-90deg); width:100%; height:100%; filter:drop-shadow(0 0 8px rgba(0,217,255,0.35));}
.timer-ring circle{fill:none; stroke-width:7;}
.timer-ring .bg{stroke:rgba(255,255,255,0.08);}
.timer-ring .fg{stroke:var(--accent2); stroke-linecap:round; transition:stroke-dashoffset .25s linear, stroke .25s;}
.timer-ring.low .fg{stroke:var(--red);}
.timer-ring .num{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:24px; font-weight:700;}

.alt-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; max-width:820px; margin:0 auto; position:relative;}
@media (max-width:560px){ .alt-grid{grid-template-columns:1fr;} }
.alt-tile{
  position:relative; overflow:hidden;
  display:flex; align-items:center; gap:14px; text-align:left;
  background:var(--glass-2); border:1px solid var(--glass-border); border-radius:16px; padding:16px 18px;
  font-size:16px; opacity:0; animation:flipin .45s ease forwards;
  cursor:pointer; color:var(--ink); font-family:var(--font-body);
  transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
}
.alt-tile:nth-child(1){animation-delay:.05s;}
.alt-tile:nth-child(2){animation-delay:.15s;}
.alt-tile:nth-child(3){animation-delay:.25s;}
.alt-tile:nth-child(4){animation-delay:.35s;}
@keyframes flipin{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;}}
.alt-tile .letter{
  font-family:var(--font-display); font-weight:700; font-size:18px; width:38px; height:38px; border-radius:10px;
  background:rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:center; color:var(--accent2); flex-shrink:0;
}
.alt-tile.tv{cursor:default;}
.alt-tile.selectable:hover{border-color:var(--accent2); transform:translateY(-2px); box-shadow:0 10px 24px rgba(0,217,255,0.15);}
.alt-tile.selected{border-color:var(--accent2); background:rgba(0,217,255,0.1); box-shadow:0 0 22px rgba(0,217,255,0.25); animation:selectPulse .5s ease;}
@keyframes selectPulse{0%{transform:scale(1);} 40%{transform:scale(1.03);} 100%{transform:scale(1);}}
.alt-tile.correct{border-color:var(--green); background:rgba(46,204,113,0.14); box-shadow:0 0 22px rgba(46,204,113,0.25);}
.alt-tile.correct .letter{background:var(--green); color:#0B1220;}
.alt-tile.wrong{border-color:var(--red); background:rgba(255,92,92,0.12); opacity:.65 !important;}
.alt-tile.disabled{pointer-events:none; opacity:.6;}

/* ---------- reveal / results ---------- */
.result-line{
  display:flex; justify-content:space-between; align-items:center; padding:12px 16px;
  border-bottom:1px solid var(--glass-border); font-size:14px;
}
.result-line:last-child{border-bottom:none;}
.result-line .status{font-weight:700; font-family:var(--font-mono); font-size:13px;}
.status.ok{color:var(--green);} .status.bad{color:var(--red);} .status.none{color:var(--ink-dim);}
.team-block{margin-bottom:18px;}
.team-block h4{font-family:var(--font-mono); color:var(--accent2); font-size:13px; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px;}
.explain{background:rgba(255,255,255,0.04); border-left:3px solid var(--accent1); padding:12px 16px; border-radius:8px; margin-top:16px; font-size:14px; color:var(--ink-dim);}

/* ---------- scoreboard ---------- */
.board-row{display:flex; align-items:center; gap:14px; padding:12px 16px; border-radius:14px; margin-bottom:8px; background:var(--glass-2); border:1px solid var(--glass-border); transition:transform .15s ease;}
.board-row.top1{border-color:rgba(0,217,255,0.5); background:linear-gradient(90deg, rgba(0,217,255,0.12), transparent); box-shadow:0 0 20px rgba(0,217,255,0.1);}
.board-rank{font-family:var(--font-display); font-weight:700; font-size:22px; color:var(--accent2); width:36px;}
.board-name{flex:1; font-weight:600;}
.board-team{color:var(--ink-dim); font-size:12px; font-family:var(--font-mono);}
.board-pts{font-family:var(--font-mono); font-size:18px; color:var(--accent3); font-weight:700;}

.podium{display:flex; align-items:flex-end; justify-content:center; gap:14px; margin:40px 0;}
.podium .p{text-align:center; border-radius:16px 16px 0 0; padding:14px 18px 0; background:var(--glass); border:1px solid var(--glass-border); border-bottom:none; backdrop-filter:blur(14px);}
.podium .p.gold{height:150px; order:2; background:linear-gradient(180deg, rgba(0,217,255,0.18), var(--glass)); box-shadow:0 0 30px rgba(0,217,255,0.15);}
.podium .p.silver{height:110px; order:1;}
.podium .p.bronze{height:90px; order:3;}
.podium .medal{font-size:30px;}
.podium .name{font-weight:700; font-size:14px; margin-top:4px;}
.podium .pts{font-family:var(--font-mono); color:var(--accent3); font-size:13px;}

/* ---------- waiting / spinner ---------- */
.center-msg{text-align:center; margin:12vh auto; max-width:400px;}
.spinner{width:44px; height:44px; border:3px solid var(--glass-border); border-top-color:var(--accent2); border-radius:50%; margin:0 auto 20px; animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.pulse{animation:pulseanim 1.6s ease-in-out infinite;}
@keyframes pulseanim{0%,100%{opacity:1;} 50%{opacity:.4;}}

.topbar{display:flex; justify-content:space-between; align-items:center; padding:14px 20px; border-bottom:1px solid var(--glass-border);}
.topbar .code-badge{font-family:var(--font-mono); color:var(--accent2); letter-spacing:2px; font-size:13px;}
.footer-note{text-align:center; color:var(--ink-dim); font-size:11px; margin-top:30px; letter-spacing:1px; font-family:var(--font-mono);}
.answered-badge{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--glass-2); backdrop-filter:blur(14px); border:1px solid var(--accent2); padding:10px 20px; border-radius:999px; font-size:13px; font-family:var(--font-mono); box-shadow:0 0 20px rgba(0,217,255,0.2);}

</style>

<canvas id="bg-canvas"></canvas>
<div id="bg-glow"></div>
<canvas id="bg-canvas"></canvas>
<div id="root"></div>

<script>
/* ============================================================
   BACKGROUND PARTICLE ANIMATION (canvas)
   ============================================================ */
(function initParticles(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const colors = ['123,92,250', '0,217,255', '255,61,154'];

  function makeParticles(){
    const count = Math.min(60, Math.floor(window.innerWidth / 22));
    particles = Array.from({length: count}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.8 + 0.6,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25,
      color: colors[Math.floor(Math.random()*colors.length)],
      alpha: Math.random() * 0.5 + 0.2
    }));
  }
  function step(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(const p of particles){
      p.x += p.vx; p.y += p.vy;
      if(p.x < 0) p.x = canvas.width; if(p.x > canvas.width) p.x = 0;
      if(p.y < 0) p.y = canvas.height; if(p.y > canvas.height) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
      ctx.shadowBlur = 8;
      ctx.shadowColor = `rgba(${p.color},0.6)`;
      ctx.fill();
    }
    // faint connecting lines for nearby particles
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const a = particles[i], b = particles[j];
        const dx = a.x-b.x, dy = a.y-b.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if(dist < 120){
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(123,92,250,${0.08 * (1 - dist/120)})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(step);
  }

  // primeira montagem
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  makeParticles();

  // resize: só reage a mudanças reais de largura (evita "flash" quando a
  // barra de endereço do celular aparece/some, que só muda a altura),
  // e reaproveita as partículas existentes em vez de recriar tudo.
  let lastWidth = window.innerWidth;
  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const newW = window.innerWidth, newH = window.innerHeight;
      const widthChanged = Math.abs(newW - lastWidth) > 40;
      canvas.width = newW;
      canvas.height = newH;
      if(widthChanged){
        lastWidth = newW;
        makeParticles();
      }else{
        particles.forEach(p => { p.x = Math.min(p.x, canvas.width); p.y = Math.min(p.y, canvas.height); });
      }
    }, 250);
  });

  requestAnimationFrame(step);
})();

/* ============================================================
   CLICK RIPPLE / FLASH EFFECT (global, delegated)
   ============================================================ */
document.addEventListener('click', function(ev){
  const el = ev.target.closest('.btn, .role-card, .alt-tile.selectable, .alt-tile.tv');
  if(!el) return;
  el.style.position = el.style.position || 'relative';
  el.style.overflow = 'hidden';
  const rect = el.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const size = Math.max(rect.width, rect.height) * 1.4;
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (ev.clientX - rect.left - size/2) + 'px';
  ripple.style.top = (ev.clientY - rect.top - size/2) + 'px';
  el.appendChild(ripple);
  setTimeout(() => ripple.remove(), 650);
}, true);

/* ============================================================
   CONFIGURAÇÃO — cole aqui a URL do seu Apps Script (termina em /exec)
   ============================================================ */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz2qme3PjU3dnn5InlzMzZQiZo64jzjYPegS5l2BwNvl9tKQF19FeYAeHiROSxSjtWQxQ/exec';

/* ============================================================
   BACKEND HELPERS (Google Apps Script + Google Sheets)
   ============================================================ */
async function api(action, payload){
  payload = payload || {};
  try{
    const resp = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // evita preflight CORS no Apps Script
      body: JSON.stringify(Object.assign({ action }, payload))
    });
    return await resp.json();
  }catch(e){
    console.error('API error', action, e);
    return { error: 'Falha de conexão com o servidor. Confira a URL do Apps Script e sua internet.' };
  }
}
async function apiCreateRoom(code, state){ return api('createRoom', { code, state }); }
async function apiGetState(code){ const r = await api('getState', { code }); return r.state || null; }
async function apiUpdateState(code, state){ return api('updateState', { code, state }); }
async function apiJoinPlayer(code, player){ return api('joinPlayer', { code, player }); }
async function apiListPlayers(code){ const r = await api('listPlayers', { code }); return r.players || []; }
async function apiSubmitAnswer(code, questionIndex, playerId, answer){ return api('submitAnswer', { code, questionIndex, playerId, answer }); }
async function apiListAnswers(code, questionIndex){ const r = await api('listAnswers', { code, questionIndex }); return r.answers || []; }

async function testConnection(){
  const box = document.getElementById('connection-test-result');
  if(!box) return;
  box.innerHTML = '<span class="mono" style="color:var(--ink-dim);">Testando...</span>';
  if(!GAS_URL || GAS_URL.indexOf('COLE_AQUI') === 0){
    box.innerHTML = '<span class="mono" style="color:var(--red);">✗ GAS_URL não configurada no arquivo.</span>';
    return;
  }
  // 1) o servidor responde? (GET simples, testa doGet)
  try{
    const resp = await fetch(GAS_URL);
    const data = await resp.json();
    if(!data || data.ok !== true){
      box.innerHTML = '<span class="mono" style="color:var(--red);">✗ Servidor respondeu algo inesperado: '+esc(JSON.stringify(data))+'</span>';
      return;
    }
  }catch(e){
    box.innerHTML = '<span class="mono" style="color:var(--red);">✗ Não consegui alcançar o servidor: '+esc(e.message)+'</span>';
    return;
  }
  // 2) o backend consegue escrever/ler na planilha e gerar perguntas?
  const testCode = 'TEST';
  const testState = { code: testCode, mode:'individual', theme:'teste', timeLimit:10, teams:[], questions:[], currentIndex:-1, phase:'lobby', questionStartTime:null, players:[], scores:{}, lastRoundResults:null, createdAt: Date.now() };
  const createR = await apiCreateRoom(testCode, testState);

    box.innerHTML = '<span class="mono" style="color:var(--red);">✗ Erro ao gravar na planilha: '+esc(createR.error)+'</span>';

}

function uid(){ return (crypto.randomUUID ? crypto.randomUUID() : 'p-'+Date.now()+'-'+Math.random().toString(36).slice(2)); }
function roomCode(){ return String(Math.floor(1000 + Math.random()*9000)); }
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ============================================================
   APP STATE
   ============================================================ */
const App = {
  screen: 'landing',
  role: null,           // 'host' | 'player'
  roomCode: null,
  state: null,           // room state object (from storage)
  playerId: null,
  playerName: null,
  playerTeam: null,
  hostLobbyPlayers: [],  // host-side cache during lobby
  selectedAnswer: null,
  hasAnswered: false,
  aiError: null,
  loading: false,
  timerTick: 0,
  pollHandle: null,
  tickHandle: null,
  setupTeams: ['Equipe A', 'Equipe B'],
};

function goto(screen){
  App.screen = screen;
  render();
}

/* ============================================================
   AI QUESTION GENERATION (via Apps Script, chave protegida no backend)
   ============================================================ */
async function generateQuestions(theme, count){
  const r = await api('generateQuestions', { theme, count });
  if(r.error) throw new Error(r.error);
  if(!Array.isArray(r.questions) || r.questions.length === 0) throw new Error('A IA não retornou perguntas válidas.');
  return r.questions;
}

function assignTypesAndPoints(questions){
  return questions.map(q => {
    const isBonus = Math.random() < 0.3;
    const type = isBonus ? 'BONUS' : 'PADRAO';
    const points = isBonus ? (Math.random() < 0.5 ? 50 : 100) : 10;
    return Object.assign({}, q, { type, points });
  });
}

/* ============================================================
   HOST ACTIONS
   ============================================================ */
async function hostCreateRoom(cfg){
  App.loading = true; App.aiError = null; render();
  try{
    const rawQuestions = await generateQuestions(cfg.theme, cfg.questionCount);
    const questions = assignTypesAndPoints(rawQuestions);
    const code = roomCode();
    const state = {
      code, mode: cfg.mode, theme: cfg.theme, timeLimit: cfg.timeLimit,
      teams: cfg.mode === 'equipes' ? cfg.teams : [],
      questions, currentIndex: -1, phase: 'lobby',
      questionStartTime: null, players: [], scores: {}, lastRoundResults: null,
      createdAt: Date.now()
    };
    const createResult = await apiCreateRoom(code, state);
    if(createResult.error){ throw new Error(createResult.error); }
    App.roomCode = code;
    App.state = state;
    App.role = 'host';
    App.hostLobbyPlayers = [];
    App.loading = false;
    startHostLobbyPolling();
    goto('host-lobby');
  }catch(e){
    console.error(e);
    App.loading = false;
    App.aiError = 'Não foi possível gerar as perguntas: ' + (e.message || 'erro desconhecido') + '. Verifique a URL do Apps Script, a implantação e a chave de API.';
    render();
  }
}

async function fetchLobbyPlayers(){
  const players = await apiListPlayers(App.roomCode);
  players.sort((a,b) => new Date(a.joinedAt) - new Date(b.joinedAt));
  return players;
}

function startHostLobbyPolling(){
  stopPolling();
  App.pollHandle = setInterval(async () => {
    if(App.screen !== 'host-lobby') return;
    const fresh = await fetchLobbyPlayers();
    const changed = JSON.stringify(fresh) !== JSON.stringify(App.hostLobbyPlayers);
    App.hostLobbyPlayers = fresh;
    if(changed) render();
  }, 1500);
}

async function hostStartGame(){
  App.hostLobbyPlayers = await fetchLobbyPlayers();
  if(App.hostLobbyPlayers.length === 0){ alert('Aguarde pelo menos 1 jogador entrar na sala.'); return; }
  App.state.players = App.hostLobbyPlayers.map(p => ({ id:p.id, name:p.name, team:p.team||null }));
  App.state.scores = {};
  App.state.players.forEach(p => App.state.scores[p.id] = 0);
  App.state.currentIndex = 0;
  App.state.phase = 'question';
  App.state.questionStartTime = Date.now();
  App.state.lastRoundResults = null;
  const r1 = await apiUpdateState(App.roomCode, App.state);
  if(r1.error) console.error('Falha ao salvar estado:', r1.error);
  startHostGamePolling();
  goto('host-game');
}

function startHostGamePolling(){
  stopPolling();
  App.answerCount = 0;
  App.pollHandle = setInterval(async () => {
    if(App.state.phase === 'question'){
      const answers = await apiListAnswers(App.roomCode, App.state.currentIndex);
      App.answerCount = answers.length;
      updateAnswerCountInDOM();
    }
  }, 1500);
  App.tickHandle = setInterval(() => { App.timerTick++; updateTimerInDOM(); }, 250);
}

function renderIfCurrent(screens){
  if(screens.includes(App.screen)) render();
}

function updateTimerInDOM(){
  if(App.screen !== 'host-game' && App.screen !== 'player-game') return;
  if(!App.state || !App.state.questionStartTime) return;
  const box = document.querySelector('.timer-ring');
  if(!box) return;
  const total = App.state.timeLimit;
  const remain = timeRemaining();
  const pct = Math.max(0, remain / total);
  const r = 40, c = 2 * Math.PI * r;
  const offset = c * (1 - pct);
  const low = remain <= 5;
  box.classList.toggle('low', low);
  box.classList.toggle('pulse', low);
  const fg = box.querySelector('.fg');
  if(fg){ fg.setAttribute('stroke-dasharray', c); fg.setAttribute('stroke-dashoffset', offset); }
  const num = box.querySelector('.num');
  if(num) num.textContent = remain;
}

function updateAnswerCountInDOM(){
  if(App.screen !== 'host-game') return;
  const el = document.getElementById('answer-count-badge');
  if(el) el.textContent = '👥 ' + (App.answerCount || 0) + '/' + App.state.players.length + ' RESPONDERAM';
}

async function hostRevealAnswer(){
  const q = App.state.questions[App.state.currentIndex];
  const answers = await apiListAnswers(App.roomCode, App.state.currentIndex);

  const results = App.state.players.map(p => {
    const a = answers.find(x => x.playerId === p.id);
    const answer = a ? a.answer : null;
    const correct = answer === q.correct;
    const points = correct ? q.points : 0;
    App.state.scores[p.id] = (App.state.scores[p.id] || 0) + points;
    return { playerId:p.id, name:p.name, team:p.team, answer, correct, points };
  });

  App.state.lastRoundResults = results;
  App.state.phase = 'reveal';
  const r2 = await apiUpdateState(App.roomCode, App.state);
  if(r2.error) console.error('Falha ao salvar estado:', r2.error);
  goto('host-reveal');
}

async function hostNextQuestion(){
  const nextIdx = App.state.currentIndex + 1;
  if(nextIdx >= App.state.questions.length){
    App.state.phase = 'end';
    const r3 = await apiUpdateState(App.roomCode, App.state);
    if(r3.error) console.error('Falha ao salvar estado:', r3.error);
    stopPolling();
    goto('host-end');
    return;
  }
  App.state.currentIndex = nextIdx;
  App.state.phase = 'question';
  App.state.questionStartTime = Date.now();
  App.state.lastRoundResults = null;
  const r1 = await apiUpdateState(App.roomCode, App.state);
  if(r1.error) console.error('Falha ao salvar estado:', r1.error);
  startHostGamePolling();
  goto('host-game');
}

function stopPolling(){
  if(App.pollHandle) clearInterval(App.pollHandle);
  if(App.tickHandle) clearInterval(App.tickHandle);
  App.pollHandle = null; App.tickHandle = null;
}

App.foundRoom = null;

async function playerLookupRoom(code){
  App.joinError = null; App.loading = true; render();
  const state = await apiGetState(code);
  App.loading = false;
  if(!state){ App.joinError = 'Sala não encontrada. Confira o código.'; render(); return; }
  if(state.phase !== 'lobby'){ App.joinError = 'Esta partida já começou ou terminou.'; render(); return; }
  App.roomCode = code;
  App.foundRoom = state;
  render();
}

async function playerJoin(name, team){
  App.playerId = uid();
  App.playerName = name;
  App.playerTeam = team || null;
  await apiJoinPlayer(App.roomCode, { id: App.playerId, name, team: team||null });
  App.role = 'player';
  startPlayerWaitPolling();
  goto('player-wait');
}

function startPlayerWaitPolling(){
  stopPolling();
  App.pollHandle = setInterval(async () => {
    const state = await apiGetState(App.roomCode);
    if(!state) return;
    App.state = state;
    if(state.phase === 'question'){
      App.hasAnswered = false;
      App.selectedAnswer = null;
      startPlayerGamePolling();
      goto('player-game');
    }
  }, 1500);
}

function startPlayerGamePolling(){
  stopPolling();
  App.pollHandle = setInterval(async () => {
    const state = await apiGetState(App.roomCode);
    if(!state) return;
    const prevPhase = App.state.phase, prevIdx = App.state.currentIndex;
    App.state = state;
    if(state.phase === 'reveal' && (prevPhase !== 'reveal' || prevIdx !== state.currentIndex)){
      goto('player-reveal');
      return;
    }
    if(state.phase === 'question' && state.currentIndex !== prevIdx){
      App.hasAnswered = false; App.selectedAnswer = null;
      render();
    }
    if(state.phase === 'end'){
      stopPolling();
      goto('player-end');
      return;
    }
  }, 1500);
  App.tickHandle = setInterval(() => { App.timerTick++; updateTimerInDOM(); }, 250);
}

async function playerAnswer(letter){
  if(App.hasAnswered) return;
  App.hasAnswered = true;
  App.selectedAnswer = letter;
  render();
  await apiSubmitAnswer(App.roomCode, App.state.currentIndex, App.playerId, letter);
}

function watchPlayerReveal(){
  stopPolling();
  App.pollHandle = setInterval(async () => {
    const state = await apiGetState(App.roomCode);
    if(!state) return;
    const prevIdx = App.state.currentIndex, prevPhase = App.state.phase;
    App.state = state;
    if(state.phase === 'question' && (state.currentIndex !== prevIdx)){
      App.hasAnswered = false; App.selectedAnswer = null;
      startPlayerGamePolling();
      goto('player-game');
      return;
    }
    if(state.phase === 'end'){ stopPolling(); goto('player-end'); return; }
  }, 1500);
}

/* ============================================================
   TIMER HELPERS
   ============================================================ */
function timeRemaining(){
  if(!App.state || !App.state.questionStartTime) return 0;
  const elapsed = (Date.now() - App.state.questionStartTime) / 1000;
  return Math.max(0, Math.ceil(App.state.timeLimit - elapsed));
}
function timerRingHTML(){
  const total = App.state.timeLimit;
  const remain = timeRemaining();
  const pct = Math.max(0, remain / total);
  const r = 40, c = 2*Math.PI*r;
  const offset = c * (1-pct);
  const low = remain <= 5;
  return `<div class="timer-ring ${low?'low pulse':''}">
    <svg viewBox="0 0 96 96">
      <defs><linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#22E5FF"/><stop offset="100%" stop-color="#8B5CF6"/>
      </linearGradient></defs>
      <circle class="bg" cx="48" cy="48" r="${r}"/>
      <circle class="fg" cx="48" cy="48" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
    </svg>
    <div class="num">${remain}</div>
  </div>`;
}

   RENDER: HOST REVEAL
   ============================================================ */
function groupResultsByTeam(results){
  const groups = {};
  results.forEach(r => {
    const key = r.team || '—';
    if(!groups[key]) groups[key] = [];
    groups[key].push(r);
  });
  return groups;
}

function renderResultLines(results){
  return results.map(r => `
    <div class="result-line">
      <span>${esc(r.name)}</span>
      <span>${r.answer ? r.answer : '<span class="mono" style="color:var(--ink-dim)">sem resposta</span>'}
        → <span class="status ${r.answer===null?'none':(r.correct?'ok':'bad')}">${r.answer===null?'—':(r.correct?'✅ CORRETO':'❌ ERRADO')}</span>
        ${r.points>0 ? ' <span class="mono" style="color:var(--accent3)">+'+r.points+'pts</span>' : ''}
      </span>
    </div>`).join('');
}

function renderHostReveal(){
  const q = App.state.questions[App.state.currentIndex];
  const idx = App.state.currentIndex + 1;
  const results = App.state.lastRoundResults;
  const isTeams = App.state.mode === 'equipes';

  const alts = altLetters().map(L => {
    let cls = 'alt-tile tv';
    if(L === q.correct) cls += ' correct';
    return `<div class="${cls}"><span class="letter">${L}</span><span>${esc(q.options[L])}</span></div>`;
  }).join('');

  let resultsHTML;
  if(isTeams){
    const groups = groupResultsByTeam(results);
    resultsHTML = Object.keys(groups).map(team => `
      <div class="team-block">
        <h4>${esc(team)}</h4>
        ${renderResultLines(groups[team])}
      </div>`).join('');
  }else{
    resultsHTML = renderResultLines(results);
  }

  const ranking = rankedPlayers();
  const rankHTML = ranking.slice(0,5).map((p,i) => `
    <div class="board-row ${i===0?'top1':''}">
      <div class="board-rank">${i+1}º</div>
      <div class="board-name">${esc(p.name)}${p.team?' <span class="board-team">'+esc(p.team)+'</span>':''}</div>
      <div class="board-pts">${p.score} pts</div>
    </div>`).join('');

  return `
  <div class="wrap">
    <div class="eyebrow">RESULTADO DA RODADA #${idx}</div>
    <div class="q-stage" style="padding:30px 20px;">
      <div class="q-text" style="font-size:clamp(20px,3vw,30px); margin-bottom:20px;">${esc(q.text)}</div>
      <div class="alt-grid">${alts}</div>
      <div class="explain">✔ Resposta correta: <strong>${q.correct}</strong> — ${esc(q.explanation)}</div>
    </div>
    <div class="panel">
      <div class="eyebrow" style="margin-bottom:10px;">RESPOSTAS</div>
      ${resultsHTML}
    </div>
    <div class="panel">
      <div class="eyebrow" style="margin-bottom:10px;">PLACAR ATUALIZADO</div>
      ${rankHTML}
    </div>
    <div class="btn-row" style="justify-content:center;">
      <button class="btn" id="btn-next">${App.state.currentIndex+1 >= App.state.questions.length ? 'Ver Resultado Final 🏆' : 'Próxima Pergunta →'}</button>
    </div>
  </div>`;
}

function rankedPlayers(){
  const list = App.state.players.map(p => ({ id:p.id, name:p.name, team:p.team, score: App.state.scores[p.id]||0 }));
  if(App.state.mode === 'equipes'){
    const teamTotals = {};
    list.forEach(p => { const t = p.team||'—'; teamTotals[t] = (teamTotals[t]||0) + p.score; });
    return Object.keys(teamTotals).map(t => ({ name:t, team:null, score:teamTotals[t] })).sort((a,b)=>b.score-a.score);
  }
  return list.sort((a,b) => b.score - a.score);
}

  const ranking = rankedPlayers();
  const [first, second, third] = [ranking[0], ranking[1], ranking[2]];
  const podium = `
    <div class="podium">
      ${second ? `<div class="p silver"><div class="medal">🥈</div><div class="name">${esc(second.name)}</div><div class="pts">${second.score} pts</div></div>` : ''}
      ${first ? `<div class="p gold"><div class="medal">🥇</div><div class="name">${esc(first.name)}</div><div class="pts">${first.score} pts</div></div>` : ''}
      ${third ? `<div class="p bronze"><div class="medal">🥉</div><div class="name">${esc(third.name)}</div><div class="pts">${third.score} pts</div></div>` : ''}
    </div>`;
  const restHTML = ranking.slice(3).map((p,i) => `
    <div class="board-row"><div class="board-rank">${i+4}º</div><div class="board-name">${esc(p.name)}</div><div class="board-pts">${p.score} pts</div></div>
  `).join('');

  return `
  <div class="wrap narrow">
    <h1 class="stage-title" style="font-size:clamp(36px,7vw,60px); margin-top:5vh;">FIM DE<br>JOGO</h1>
    ${podium}
    ${restHTML ? `<div class="panel">${restHTML}</div>` : ''}
    <div class="btn-row" style="justify-content:center;">
      <button class="btn" data-action="go-landing">Nova Partida</button>
    </div>
  </div>`;
}

/* ============================================================
   RENDER: PLAYER JOIN
   ============================================================ */
function renderPlayerJoin(){
  const teams = App.foundRoom ? App.foundRoom.teams : [];
  return `
  <div class="wrap narrow">
    <div class="eyebrow" style="text-align:center; margin-top:30px;">ENTRAR NA PARTIDA</div>
    <h2 style="text-align:center; font-size:32px; margin-bottom:24px;">📱 Área do Jogador</h2>
    <div class="panel">
      ${App.joinError ? `<div class="error-box">${esc(App.joinError)}</div>` : ''}
      ${!App.foundRoom ? `
        <div class="field">
          <label>Código da sala</label>
          <input type="text" id="join-code" maxlength="4" inputmode="numeric" placeholder="0000" style="text-align:center; font-family:var(--font-mono); font-size:24px; letter-spacing:6px;">
        </div>
        <button class="btn wide" id="btn-lookup" ${App.loading?'disabled':''}>${App.loading?'Procurando...':'Buscar sala'}</button>
      ` : `
        <div class="field">
          <label>Sala ${App.roomCode} encontrada ✓</label>
        </div>
        <div class="field">
          <label>Seu nome</label>
          <input type="text" id="join-name" placeholder="Digite seu nome" maxlength="24">
        </div>
        ${teams.length ? `
        <div class="field">
          <label>Sua equipe</label>
          <select id="join-team">${teams.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('')}</select>
        </div>` : ''}
        <button class="btn wide" id="btn-join">Entrar na sala</button>
      `}
      <div class="btn-row"><button class="link" data-action="go-landing" type="button">← voltar</button></div>
    </div>
  </div>`;
}

/* ============================================================
   RENDER: PLAYER WAIT
   ============================================================ */
function renderPlayerWait(){
  return `
  <div class="wrap narrow">
    <div class="center-msg">
      <div class="spinner"></div>
      <h3 style="font-size:24px; margin-bottom:8px;">Você está na sala!</h3>
      <p class="helper">Olá, ${esc(App.playerName)}${App.playerTeam ? ' ('+esc(App.playerTeam)+')' : ''}. Aguardando o apresentador iniciar a partida...</p>
      <p class="mono" style="color:var(--accent2); margin-top:16px;">SALA ${App.roomCode}</p>
    </div>
  </div>`;
}

/* ============================================================
   RENDER: PLAYER GAME
   ============================================================ */
function renderPlayerGame(){
  const q = App.state.questions[App.state.currentIndex];
  const idx = App.state.currentIndex + 1;
  const remain = timeRemaining();
  const timedOut = remain <= 0;
  const alts = altLetters().map(L => {
    let cls = 'alt-tile selectable';
    if(App.hasAnswered && App.selectedAnswer === L) cls += ' selected';
    if(App.hasAnswered || timedOut) cls += ' disabled';
    return `<div class="${cls}" data-answer="${L}"><span class="letter">${L}</span><span>${esc(q.options[L])}</span></div>`;
  }).join('');

  return `
  <div class="wrap narrow">
    <div class="q-header">
      <div class="tag ${q.type==='BONUS'?'bonus':'padrao'}">${q.type === 'BONUS' ? '⚡ BÔNUS · '+q.points+' PTS' : 'PADRÃO · 10 PTS'}</div>
      <div class="mono" style="color:var(--ink-dim); font-size:12px;">PERGUNTA #${idx}</div>
    </div>
    ${timerRingHTML()}
    <div class="q-text" style="font-size:22px; margin-bottom:20px; text-align:center;">${esc(q.text)}</div>
    <div class="alt-grid" style="grid-template-columns:1fr;">${alts}</div>
    ${App.hasAnswered ? `<div class="answered-badge">✓ Resposta enviada — aguardando os outros jogadores</div>` : ''}
    ${!App.hasAnswered && timedOut ? `<div class="answered-badge">⏱ Tempo esgotado</div>` : ''}
  </div>`;
}

/* ============================================================
   RENDER: PLAYER REVEAL
   ============================================================ */
function renderPlayerReveal(){
  const q = App.state.questions[App.state.currentIndex];
  const mine = (App.state.lastRoundResults||[]).find(r => r.playerId === App.playerId);
  const alts = altLetters().map(L => {
    let cls = 'alt-tile tv';
    if(L === q.correct) cls += ' correct';
    else if(mine && mine.answer === L) cls += ' wrong';
    return `<div class="${cls}"><span class="letter">${L}</span><span>${esc(q.options[L])}</span></div>`;
  }).join('');
  const myScore = App.state.scores[App.playerId] || 0;
  const ranking = rankedPlayersRaw();
  const myRank = ranking.findIndex(p => p.id === App.playerId) + 1;

  return `
  <div class="wrap narrow">
    <div class="center-msg" style="margin-top:6vh;">
      ${mine && mine.correct ? `<h2 style="color:var(--green); font-size:40px;">✅ CORRETO!</h2><p class="mono" style="color:var(--accent3); font-size:18px;">+${mine.points} pts</p>`
        : `<h2 style="color:var(--red); font-size:36px;">❌ ${mine && mine.answer===null ? 'SEM RESPOSTA' : 'ERRADO'}</h2>`}
    </div>
    <div class="alt-grid" style="grid-template-columns:1fr; margin-top:10px;">${alts}</div>
    <div class="explain">${esc(q.explanation)}</div>
    <div class="panel" style="text-align:center;">
      <div class="eyebrow">SEU PLACAR</div>
      <div style="font-family:var(--font-display); font-size:44px; color:var(--accent3);">${myScore} pts</div>
      <p class="helper">${myRank}º lugar no momento</p>
    </div>
  </div>`;
}

function rankedPlayersRaw(){
  return App.state.players.map(p => ({ id:p.id, name:p.name, team:p.team, score: App.state.scores[p.id]||0 })).sort((a,b)=>b.score-a.score);
}

/* ============================================================
   RENDER: PLAYER END
   ============================================================ */
function renderPlayerEnd(){
  const ranking = rankedPlayersRaw();
  const myRank = ranking.findIndex(p => p.id === App.playerId) + 1;
  const myScore = App.state.scores[App.playerId] || 0;
  return `
  <div class="wrap narrow">
    <div class="center-msg" style="margin-top:8vh;">
      <h1 class="stage-title" style="font-size:44px;">FIM DE<br>JOGO</h1>
      <p style="margin-top:20px; font-size:16px;">Você terminou em <strong style="color:var(--accent3)">${myRank}º lugar</strong></p>
      <p class="mono" style="color:var(--accent3); font-size:22px; margin-top:6px;">${myScore} pts</p>
    </div>
    <div class="btn-row" style="justify-content:center;">
      <button class="btn" data-action="go-landing">Sair</button>
    </div>
  </div>`;
}

/* ============================================================
   MAIN RENDER DISPATCH
   ============================================================ */
function screenHTML(){
  switch(App.screen){
    case 'landing': return renderLanding();
    case 'host-setup': return renderHostSetup();
    case 'host-lobby': return renderHostLobby();
    case 'host-game': return renderHostGame();
    case 'host-reveal': return renderHostReveal();
    case 'host-end': return renderHostEnd();
    case 'player-join': return renderPlayerJoin();
    case 'player-wait': return renderPlayerWait();
    case 'player-game': return renderPlayerGame();
    case 'player-reveal': return renderPlayerReveal();
    case 'player-end': return renderPlayerEnd();
    default: return renderLanding();
  }
}

function render(){
  const root = document.getElementById('root');
  root.innerHTML = screenHTML();
  attachHandlers();
}

function attachHandlers(){
  const root = document.getElementById('root');

  root.querySelectorAll('[data-action="go-host-setup"]').forEach(el => el.onclick = () => { App.setupTeams=['Equipe A','Equipe B']; goto('host-setup'); });
  const testBtn = document.getElementById('btn-test-connection');
  if(testBtn) testBtn.onclick = () => testConnection();
  root.querySelectorAll('[data-action="go-player-join"]').forEach(el => el.onclick = () => { App.foundRoom=null; App.joinError=null; goto('player-join'); });
  root.querySelectorAll('[data-action="go-landing"]').forEach(el => el.onclick = () => { stopPolling(); App.foundRoom=null; goto('landing'); });

  // host setup
  const modeSel = document.getElementById('cfg-mode');
  if(modeSel){
    const teamsSection = document.getElementById('teams-section');
    modeSel.onchange = () => { teamsSection.style.display = modeSel.value === 'equipes' ? 'block' : 'none'; };
  }
  root.querySelectorAll('.team-name-input').forEach(el => {
    el.oninput = () => { App.setupTeams[parseInt(el.dataset.idx)] = el.value; };
  });
  const addTeamBtn = root.querySelector('[data-action="add-team"]');
  if(addTeamBtn) addTeamBtn.onclick = () => {
    if(App.setupTeams.length >= 6) return;
    App.setupTeams.push('Equipe ' + String.fromCharCode(65 + App.setupTeams.length));
    render();
    document.getElementById('cfg-mode').value = 'equipes';
    document.getElementById('teams-section').style.display = 'block';
  };
  root.querySelectorAll('[data-action="remove-team"]').forEach(el => {
    el.onclick = () => { App.setupTeams.splice(parseInt(el.dataset.idx),1); render(); document.getElementById('cfg-mode').value='equipes'; document.getElementById('teams-section').style.display='block'; };
  });
  const createBtn = document.getElementById('btn-create-room');
  if(createBtn) createBtn.onclick = () => {
    const mode = document.getElementById('cfg-mode').value;
    const theme = document.getElementById('cfg-theme').value.trim();
    const count = parseInt(document.getElementById('cfg-count').value) || 10;
    const time = parseInt(document.getElementById('cfg-time').value) || 20;
    if(!theme){ App.aiError = 'Digite um tema para a IA gerar as perguntas.'; render(); return; }
    const teams = App.setupTeams.map(t => t.trim()).filter(Boolean);
    hostCreateRoom({ mode, theme, questionCount: count, timeLimit: time, teams });
  };

  // host lobby
  const startBtn = document.getElementById('btn-start-game');
  if(startBtn) startBtn.onclick = () => hostStartGame();

  // host game
  const revealBtn = document.getElementById('btn-reveal');
  if(revealBtn) revealBtn.onclick = () => { stopPolling(); hostRevealAnswer(); };

  // host reveal
  const nextBtn = document.getElementById('btn-next');
  if(nextBtn) nextBtn.onclick = () => hostNextQuestion();

  // player join
  const lookupBtn = document.getElementById('btn-lookup');
  if(lookupBtn) lookupBtn.onclick = () => {
    const code = document.getElementById('join-code').value.trim();
    if(code.length !== 4){ App.joinError = 'Digite o código de 4 dígitos.'; render(); return; }
    playerLookupRoom(code);
  };
  const joinBtn = document.getElementById('btn-join');
  if(joinBtn) joinBtn.onclick = () => {
    const name = document.getElementById('join-name').value.trim();
    if(!name){ alert('Digite seu nome.'); return; }
    const teamEl = document.getElementById('join-team');
    playerJoin(name, teamEl ? teamEl.value : null);
  };

  // player game answering
  root.querySelectorAll('[data-answer]').forEach(el => {
    el.onclick = () => playerAnswer(el.dataset.answer);
  });
}

render();
</script>
</body>
</html>
